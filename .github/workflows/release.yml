# Tag-triggered releases: push a v* tag → build every app that exists → one
# GitHub Release with the artifacts + generated notes. Apps check the latest
# release to show their "update available" nudge (Epic 6).
#
# The web app is NOT built here — Vercel deploys it on every push to main.
# Desktop/android jobs switch on automatically the moment those folders get a
# real project (detect job), so this pipeline is ready before the apps are.

name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.check.outputs.android }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          [ -f apps/android/gradlew ] && echo "android=true" >> "$GITHUB_OUTPUT" || echo "android=false" >> "$GITHUB_OUTPUT"

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Zip the Chrome extension
        run: |
          cd apps/extension
          zip -r "../../vivy-extension-${GITHUB_REF_NAME}.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: extension
          path: vivy-extension-*.zip

  # The Linux screen-time agent ships as a tarball: agent.js + install.sh.
  desktop-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pack the Linux agent
        run: tar -czf "vivy-linux-agent-${GITHUB_REF_NAME}.tar.gz" -C apps desktop
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-agent
          path: vivy-linux-agent-*.tar.gz

  # Debug-signed APK — installable by sideload, no keystore to manage.
  # (Move to a signed release build if this ever goes beyond personal use.)
  android:
    needs: detect
    if: needs.detect.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Build APK
        run: |
          cd apps/android
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          ./gradlew assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk "../../vivy-screentime-${GITHUB_REF_NAME}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: vivy-screentime-*.apk

  release:
    needs: [detect, extension, desktop-agent, android]
    # run once everything that applies has finished; skipped jobs are fine,
    # failed builds are not
    if: ${{ !cancelled() && needs.extension.result == 'success' && needs['desktop-agent'].result == 'success' && needs.android.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**
